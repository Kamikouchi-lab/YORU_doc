name: Collect YORU Metrics

on:
  schedule:
    # Daily at 02:15 UTC
    - cron: "15 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  collect-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch metrics
        env:
          YORU_GH_METRICS_TOKEN: ${{ secrets.YORU_GH_METRICS_TOKEN }}
        run: python scripts/fetch_github_metrics.py

      - name: Build summary
        run: python scripts/build_metrics_summary.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/
          if ! git diff --cached --quiet; then
            git commit -m "Update usage metrics data"
            git pull --rebase origin main
            git push
          else
            echo "No data changes to commit"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: collect-and-build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
